# Standalone deployment for the privacy-relayer (HTTP `serve` mode).
#
#   cp .env.example .env   # then edit RPC URL, chain id, relayer key, …
#   docker compose up -d --build
#
# The relayer broadcasts client-signed/encoded calldata via /submit_raw so that a
# holder's EOA never appears on-chain. The relayer pays gas from its own key.
services:
  relayer:
    build: .
    image: privacy-relayer:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Bind on all interfaces inside the container (host maps the port below).
      PRIVACYBTC_RELAYER_BIND: 0.0.0.0:8790
    ports:
      - "${RELAYER_HOST_PORT:-8790}:8790"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8790/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
